<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test — Vocabulary Quiz</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #6366f1;
    --primary-dark: #4f46e5;
    --success: #22c55e;
    --danger: #ef4444;
    --bg: #f8fafc;
    --card: #ffffff;
    --border: #e2e8f0;
    --text: #1e293b;
    --muted: #64748b;
    --radius: 12px;
  }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
  }
  h1 { font-size: 1.6rem; font-weight: 700; text-align: center; margin-bottom: 4px; }
  .subtitle { color: var(--muted); font-size: 0.9rem; text-align: center; margin-bottom: 20px; }

  /* Timer */
  .timer-bar {
    display: flex; align-items: center; gap: 12px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 50px; padding: 10px 24px;
    margin-bottom: 24px; font-size: 1.1rem; font-weight: 600;
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
  }
  .timer-icon { font-size: 1.3rem; }
  #timer-display { min-width: 60px; text-align: center; }
  #timer-display.warning { color: var(--danger); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

  /* Game area */
  .game-area {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    width: 100%;
    max-width: 700px;
  }
  .column { display: flex; flex-direction: column; gap: 10px; }
  .column-label {
    font-size: 0.75rem; font-weight: 700; letter-spacing: .08em;
    text-transform: uppercase; color: var(--muted);
    text-align: center; margin-bottom: 4px;
  }
  .word-card {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    cursor: pointer;
    font-size: 1rem;
    text-align: center;
    transition: border-color .15s, background .15s, transform .15s, opacity .3s;
    user-select: none;
    position: relative;
  }
  .word-card:hover:not(.matched):not(.disabled) {
    border-color: var(--primary);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(99,102,241,.15);
  }
  .word-card.selected {
    border-color: var(--primary);
    background: #eef2ff;
    font-weight: 600;
  }
  .word-card.matched {
    border-color: var(--success);
    background: #f0fdf4;
    color: #15803d;
    opacity: .55;
    cursor: default;
  }
  .word-card.shake {
    animation: shake .4s;
    border-color: var(--danger);
    background: #fef2f2;
  }
  @keyframes shake {
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-8px)}
    40%{transform:translateX(8px)}
    60%{transform:translateX(-5px)}
    80%{transform:translateX(5px)}
  }
  .word-card.disabled { pointer-events: none; }

  /* Notification toast */
  #notification {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    padding: 12px 24px; border-radius: 50px;
    font-weight: 600; font-size: .95rem;
    opacity: 0; transition: opacity .25s;
    pointer-events: none; z-index: 100;
    box-shadow: 0 4px 16px rgba(0,0,0,.15);
  }
  #notification.show { opacity: 1; }
  #notification.success { background: var(--success); color: #fff; }
  #notification.error { background: var(--danger); color: #fff; }

  /* Score screen */
  #score-screen {
    display: none;
    flex-direction: column; align-items: center; gap: 20px;
    background: var(--card); border-radius: var(--radius);
    padding: 48px 40px; max-width: 420px; width: 100%;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,.1);
  }
  .score-emoji { font-size: 4rem; }
  .score-title { font-size: 1.8rem; font-weight: 700; }
  .score-detail { color: var(--muted); font-size: 1rem; }
  .score-value { font-size: 3rem; font-weight: 800; color: var(--primary); }
  .btn-retry {
    margin-top: 8px;
    background: var(--primary); color: #fff;
    border: none; border-radius: 50px;
    padding: 14px 36px; font-size: 1rem; font-weight: 600;
    cursor: pointer; transition: background .15s;
  }
  .btn-retry:hover { background: var(--primary-dark); }

  @media (max-width: 480px) {
    .game-area { grid-template-columns: 1fr 1fr; gap: 8px; }
    .word-card { padding: 10px 8px; font-size: .85rem; }
  }
</style>
</head>
<body>

<h1>Test</h1>
<p class="subtitle">Match each English word with its Russian translation</p>

<div class="timer-bar">
  <span class="timer-icon">⏱</span>
  <span id="timer-display">0:00</span>
</div>

<div class="game-area" id="game-area">
  <div class="column">
    <div class="column-label">English</div>
    <div id="col-en"></div>
  </div>
  <div class="column">
    <div class="column-label">Russian</div>
    <div id="col-ru"></div>
  </div>
</div>

<div id="score-screen">
  <div class="score-emoji" id="score-emoji">🎉</div>
  <div class="score-title">Quiz Complete!</div>
  <div class="score-value" id="score-value"></div>
  <div class="score-detail" id="score-detail"></div>
  <button class="btn-retry" onclick="restartQuiz()">Play Again</button>
</div>

<div id="notification"></div>

<script>
(function() {
  const PAIRS = [{"en":"1","ru":"1"},{"en":"2","ru":"2"},{"en":"3","ru":"3"}];
  const INITIAL_TIMER = 60;
  const CORRECT_BONUS = 3;
  const WRONG_PENALTY = 5;

  let timerLeft = INITIAL_TIMER;
  let timerInterval = null;
  let selectedEn = null;
  let selectedRu = null;
  let matchedCount = 0;
  let mistakes = 0;
  let gameOver = false;

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function formatTime(s) {
    const m = Math.floor(Math.abs(s) / 60);
    const sec = Math.abs(s) % 60;
    return m + ':' + String(sec).padStart(2, '0');
  }

  function updateTimerDisplay() {
    const el = document.getElementById('timer-display');
    el.textContent = formatTime(timerLeft);
    el.classList.toggle('warning', timerLeft <= 10 && timerLeft > 0);
  }

  function startTimer() {
    timerInterval = setInterval(() => {
      timerLeft--;
      updateTimerDisplay();
      if (timerLeft <= 0) {
        timerLeft = 0;
        updateTimerDisplay();
        endGame(false);
      }
    }, 1000);
  }

  function showNotification(msg, type) {
    const el = document.getElementById('notification');
    el.textContent = msg;
    el.className = 'show ' + type;
    clearTimeout(el._timeout);
    el._timeout = setTimeout(() => { el.className = ''; }, 1800);
  }

  function buildBoard() {
    const enOrder = shuffle(PAIRS.map((_, i) => i));
    const ruOrder = shuffle(PAIRS.map((_, i) => i));

    const colEn = document.getElementById('col-en');
    const colRu = document.getElementById('col-ru');
    colEn.innerHTML = '';
    colRu.innerHTML = '';

    enOrder.forEach(idx => {
      const card = document.createElement('div');
      card.className = 'word-card';
      card.textContent = PAIRS[idx].en;
      card.dataset.idx = idx;
      card.dataset.side = 'en';
      card.onclick = () => selectCard(card);
      colEn.appendChild(card);
    });

    ruOrder.forEach(idx => {
      const card = document.createElement('div');
      card.className = 'word-card';
      card.textContent = PAIRS[idx].ru;
      card.dataset.idx = idx;
      card.dataset.side = 'ru';
      card.onclick = () => selectCard(card);
      colRu.appendChild(card);
    });
  }

  function selectCard(card) {
    if (gameOver || card.classList.contains('matched')) return;

    const side = card.dataset.side;

    if (side === 'en') {
      if (selectedEn) selectedEn.classList.remove('selected');
      selectedEn = card;
      card.classList.add('selected');
    } else {
      if (selectedRu) selectedRu.classList.remove('selected');
      selectedRu = card;
      card.classList.add('selected');
    }

    if (selectedEn && selectedRu) {
      checkMatch();
    }
  }

  function checkMatch() {
    const enIdx = parseInt(selectedEn.dataset.idx);
    const ruIdx = parseInt(selectedRu.dataset.idx);

    if (enIdx === ruIdx) {
      // Correct!
      selectedEn.classList.remove('selected');
      selectedRu.classList.remove('selected');
      selectedEn.classList.add('matched', 'disabled');
      selectedRu.classList.add('matched', 'disabled');
      timerLeft = Math.min(timerLeft + CORRECT_BONUS, INITIAL_TIMER * 2);
      updateTimerDisplay();
      showNotification('+' + CORRECT_BONUS + 's  Correct! ✓', 'success');
      matchedCount++;
      selectedEn = null;
      selectedRu = null;

      if (matchedCount === PAIRS.length) {
        setTimeout(() => endGame(true), 400);
      }
    } else {
      // Wrong
      mistakes++;
      const en = selectedEn, ru = selectedRu;
      en.classList.add('shake');
      ru.classList.add('shake');
      timerLeft = Math.max(0, timerLeft - WRONG_PENALTY);
      updateTimerDisplay();
      showNotification('-' + WRONG_PENALTY + 's  Wrong match ✗', 'error');

      setTimeout(() => {
        en.classList.remove('selected', 'shake');
        ru.classList.remove('selected', 'shake');
        selectedEn = null;
        selectedRu = null;
        if (timerLeft <= 0) endGame(false);
      }, 500);
    }
  }

  function endGame(won) {
    gameOver = true;
    clearInterval(timerInterval);

    document.getElementById('game-area').style.display = 'none';
    const scoreScreen = document.getElementById('score-screen');
    scoreScreen.style.display = 'flex';

    const accuracy = PAIRS.length > 0
      ? Math.round((matchedCount / (matchedCount + mistakes)) * 100) || 0
      : 0;

    let emoji, title;
    if (!won) {
      emoji = '⏰';
      document.getElementById('score-title').textContent = "Time's Up!";
    } else if (accuracy === 100) {
      emoji = '🏆';
    } else if (accuracy >= 75) {
      emoji = '🎉';
    } else if (accuracy >= 50) {
      emoji = '👍';
    } else {
      emoji = '📚';
    }
    document.getElementById('score-emoji').textContent = emoji;
    document.getElementById('score-value').textContent = accuracy + '%';
    document.getElementById('score-detail').textContent =
      matchedCount + ' of ' + PAIRS.length + ' matched · ' + mistakes + ' mistake' + (mistakes !== 1 ? 's' : '');
  }

  function restartQuiz() {
    gameOver = false;
    selectedEn = null;
    selectedRu = null;
    matchedCount = 0;
    mistakes = 0;
    timerLeft = INITIAL_TIMER;
    clearInterval(timerInterval);

    document.getElementById('score-screen').style.display = 'none';
    document.getElementById('game-area').style.display = 'grid';

    updateTimerDisplay();
    buildBoard();
    startTimer();
  }

  window.restartQuiz = restartQuiz;

  // Init
  buildBoard();
  updateTimerDisplay();
  startTimer();
})();
</script>
</body>
</html>
