<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Transport &mdash; Vocabulary Cards</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #6366f1;
    --primary-dark: #4f46e5;
    --bg: #f8fafc;
    --card: #ffffff;
    --card-back: #eef2ff;
    --border: #e2e8f0;
    --text: #1e293b;
    --muted: #64748b;
    --radius: 0.75rem;
  }
  body {
    font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.5rem 1rem;
    -webkit-tap-highlight-color: transparent;
  }
  h1 { font-size: 1.6rem; font-weight: 700; text-align: center; margin-bottom: 0.25rem; }
  .subtitle { color: var(--muted); font-size: 0.9rem; text-align: center; margin-bottom: 1.25rem; }

  .toolbar {
    display: flex;
    justify-content: center;
    margin-bottom: 1.5rem;
  }
  .btn-turn {
    background: var(--primary); color: #fff;
    border: none; border-radius: 50px;
    padding: 0.625rem 1.5rem; font-size: 0.95rem; font-weight: 600;
    cursor: pointer;
    transition: background .15s;
    touch-action: manipulation;
    display: flex; align-items: center; gap: 0.5rem;
  }
  .btn-turn:active { background: var(--primary-dark); }
  .btn-turn .icon { font-size: 1.1rem; }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1rem;
    width: 100%;
    max-width: 900px;
  }

  .flip-card {
    perspective: 800px;
    cursor: pointer;
    -webkit-user-select: none; user-select: none;
    touch-action: manipulation;
  }
  .flip-card-inner {
    position: relative;
    width: 100%;
    min-height: 120px;
    transition: transform 0.5s;
    transform-style: preserve-3d;
  }
  .flip-card.flipped .flip-card-inner {
    transform: rotateY(180deg);
  }
  .flip-card-front, .flip-card-back {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: var(--radius);
    border: 2px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.25rem 1rem;
    text-align: center;
    gap: 0.3rem;
  }
  .flip-card-front {
    background: var(--card);
  }
  .flip-card-back {
    background: var(--card-back);
    transform: rotateY(180deg);
  }
  .card-word {
    font-size: 1.15rem;
    font-weight: 600;
  }
  .card-transcription {
    font-size: 0.8rem;
    color: var(--muted);
    font-family: monospace;
  }
  .card-voice-hint {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 0.25rem;
    opacity: 0.7;
  }

  @media (max-width: 480px) {
    .cards-grid { grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .flip-card-front, .flip-card-back { padding: 1rem 0.625rem; min-height: 100px; }
    .card-word { font-size: 1rem; }
  }
</style>
</head>
<body>

<h1>Transport</h1>
<p class="subtitle" id="subtitle">Tap a card to flip it</p>

<div class="toolbar">
  <button class="btn-turn" id="btn-turn" onclick="turnCards()">
    <span class="icon">&#128260;</span>
    <span id="btn-turn-label">Turn Cards</span>
  </button>
</div>

<div class="cards-grid" id="cards-grid"></div>

<script>
(function() {
  var PAIRS = [{"en":"Car","ru":"Автомобиль","tr":"/ˈkɑːr/"},{"en":"Train","ru":"Поезд","tr":"/ˈtreɪn/"},{"en":"Bus","ru":"Автобус","tr":"/ˈbʌs/"},{"en":"Bicycle","ru":"Велосипед","tr":"/ˈbaɪsɪkl/"},{"en":"Plane","ru":"Самолет","tr":"/ˈpleɪn/"},{"en":"Ship","ru":"Корабль","tr":"/ˈʃɪp/"},{"en":"Metro","ru":"Метро","tr":"/ˈmɛtroʊ/"},{"en":"Taxi","ru":"Такси","tr":"/ˈtæksi/"},{"en":"Tram","ru":"Трамвай","tr":"/ˈtræm/"},{"en":"Motorcycle","ru":"Мотоцикл","tr":"/ˈmoʊtəsaɪkl/"},{"en":"Truck","ru":"Грузовик","tr":"/ˈtrʌk/"}];
  var reversed = false;

  function speakWord(text) {
    if (!window.speechSynthesis) return;
    var utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'en-US';
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(utt);
  }

  function buildCards() {
    var grid = document.getElementById('cards-grid');
    grid.innerHTML = '';

    PAIRS.forEach(function(pair, idx) {
      var card = document.createElement('div');
      card.className = 'flip-card';
      card.setAttribute('data-idx', idx);

      var inner = document.createElement('div');
      inner.className = 'flip-card-inner';

      var front = document.createElement('div');
      front.className = 'flip-card-front';
      var frontWord = document.createElement('span');
      frontWord.className = 'card-word';
      front.appendChild(frontWord);

      var frontTr = document.createElement('span');
      frontTr.className = 'card-transcription';
      front.appendChild(frontTr);

      var back = document.createElement('div');
      back.className = 'flip-card-back';
      var backWord = document.createElement('span');
      backWord.className = 'card-word';
      back.appendChild(backWord);

      var backTr = document.createElement('span');
      backTr.className = 'card-transcription';
      back.appendChild(backTr);

      if (!reversed) {
        frontWord.textContent = pair.en;
        frontTr.textContent = pair.tr || '';
        backWord.textContent = pair.ru;
        backTr.textContent = '';
      } else {
        frontWord.textContent = pair.ru;
        frontTr.textContent = '';
        backWord.textContent = pair.en;
        backTr.textContent = pair.tr || '';
      }

      inner.appendChild(front);
      inner.appendChild(back);
      card.appendChild(inner);

      card.addEventListener('click', function() {
        var isFlipped = card.className.indexOf('flipped') !== -1;
        if (!isFlipped) {
          card.className += ' flipped';
          speakWord(pair.en);
        } else {
          card.className = 'flip-card';
        }
      });

      grid.appendChild(card);
    });
  }

  function turnCards() {
    reversed = !reversed;
    var label = document.getElementById('btn-turn-label');
    var subtitle = document.getElementById('subtitle');
    if (reversed) {
      label.textContent = 'Turn Back';
      subtitle.textContent = 'Tap a card to see the English word';
    } else {
      label.textContent = 'Turn Cards';
      subtitle.textContent = 'Tap a card to flip it';
    }
    buildCards();
  }

  window.turnCards = turnCards;
  buildCards();
})();
</script>
</body>
</html>
