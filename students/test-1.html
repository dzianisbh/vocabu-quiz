<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test 1 — Vocabulary Quizzes</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #f8fafc; color: #1e293b;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; padding: 48px 16px;
  }
  h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 8px; }
  .subtitle { color: #64748b; margin-bottom: 32px; }
  .quiz-list { list-style: none; width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 12px; }
  .quiz-link {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 20px; background: #fff; border: 2px solid #e2e8f0;
    border-radius: 12px; text-decoration: none; color: #1e293b;
    font-size: 1rem; font-weight: 500;
    transition: border-color .15s, transform .15s, box-shadow .15s;
  }
  .quiz-link:hover { border-color: #6366f1; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(99,102,241,.15); }
  .icon { font-size: 1.2rem; }
</style>
</head>
<body>
  <h1>👋 Test 1</h1>
  <p class="subtitle">Your vocabulary quizzes</p>
  <ul class="quiz-list">
    <li><a href="https://dzianisbh.github.io/vocabu-quiz/quizzes/105e7368-5fc1-4010-9103-b4f9fe3e1387.html" class="quiz-link"><span class="icon">📝</span><span>Test</span></a></li>
  </ul>
</body>
</html>
